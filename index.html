<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>RayoCero Running | Ecosistema Deportivo</title>
    <meta name="description" content="Módulo de Gestión de Atletas e Inscripciones. Ingeniería de carrera por Valkyron Group." />
    <meta name="author" content="Valkyron Group" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#03070b" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RayoCero" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- iOS Splash Screens — carátula de inicio -->
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- OG -->
    <meta property="og:title" content="RayoCero Running | Valkyron Group" />
    <meta property="og:description" content="Ecosistema Deportivo" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rayocero-run.vercel.app" />
    <meta property="og:site_name" content="Valkyron Group" />
    <meta property="og:image" content="https://rayocero-run.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rayocero Running" />
    <meta name="twitter:description" content="Tecnología de cronometraje y gestión de atletas por Valkyron Group." />
    <meta name="twitter:image" content="https://rayocero-run.vercel.app/og-image.png" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />

    <!-- Preconnect para Google Fonts — reduce latencia DNS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuentes globales — una sola carga para toda la app -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,400;1,700;1,800;1,900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,400;1,700;1,800;1,900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" />
    </noscript>

    <!-- Leaflet CSS — requerido para mapas GPS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      body {
        background-color: #03070b;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* Splash screen mientras carga la PWA */
      #root:empty::before {
        content: '⚡';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        background: #03070b;
        color: #00f2ff;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
