<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>RayoCero Running | Ecosistema Deportivo</title>
    <meta name="description" content="Módulo de Gestión de Atletas e Inscripciones. Ingeniería de carrera por Valkyron Group." />
    <meta name="author" content="Valkyron Group" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#03070b" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RayoCero" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon-precomposed" href="/logo.png" />

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/logo.png"
      media="screen and (device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- ✅ Favicon correcto — logo.png en lugar del emoji SVG -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />

    <!-- OG -->
    <meta property="og:title" content="RayoCero Running | Valkyron Group" />
    <meta property="og:description" content="Ecosistema Deportivo" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rayocero-run.vercel.app" />
    <meta property="og:site_name" content="Valkyron Group" />
    <meta property="og:image" content="https://rayocero-run.vercel.app/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rayocero Running" />
    <meta name="twitter:description" content="Tecnología de cronometraje y gestión de atletas por Valkyron Group." />
    <meta name="twitter:image" content="https://rayocero-run.vercel.app/logo.png" />

    <!-- Preconnect para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuentes globales -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,400;1,700;1,800;1,900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;1,400;1,700;1,800;1,900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" />
    </noscript>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      body {
        background-color: #03070b;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* Splash screen mientras carga la PWA — usa logo.png */
      #root:empty {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #03070b;
        z-index: 9999;
      }

      #root:empty::before {
        content: '';
        display: block;
        width: 96px;
        height: 96px;
        background-image: url('/logo.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: splash-pulse 1.2s ease infinite;
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.92); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
